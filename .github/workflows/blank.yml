name: CI
on:
  push:
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/cache@v5
        with:
          path: /usr/local/lib/node_modules
          key: ${{ runner.os }}-graphql-node-modules
      - uses: actions/cache@v5
        with:
          path: /usr/local/bin/magidoc
          key: ${{ runner.os }}-graphql-magidoc
      - name: ...
        run: |
          if [ -z "$(command -v magidoc)" ]; then
            npm install -g @magidoc/cli@6.3.0
          fi
          which magidoc
          ls -l $(which magidoc)
